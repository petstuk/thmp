name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/hypothesis_service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e ../thmp_common -e .
          pip install pytest ruff
      - name: Ruff
        run: ruff check ../thmp_common ../user_service/app ../audit_service/app ../hypothesis_service/app
      - name: Pytest
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc -b --noEmit
      - run: npm run build

  smoke-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Env file
        run: cp .env.example .env
      - name: Start stack
        run: docker compose up -d --build
      - name: Wait for service health
        run: |
          set -e
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8001/health/live >/dev/null 2>&1 \
              && curl -fsS http://127.0.0.1:8002/health/live >/dev/null 2>&1 \
              && curl -fsS http://127.0.0.1:8003/health/live >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8001/health/live
          curl -fsS http://127.0.0.1:8002/health/live
          curl -fsS http://127.0.0.1:8003/health/live
          sleep 5
      - name: Smoke API (Traefik)
        run: SMOKE_BASE_URL=http://127.0.0.1 python3 scripts/smoke_api.py
